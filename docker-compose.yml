services:
  db:
    image: postgres:16-alpine
    container_name: t2-schedule-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: t2_schedule
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d t2_schedule"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: t2-schedule-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/t2_schedule
      JWT_SECRET_KEY: CHANGE_ME_TO_A_LONG_RANDOM_SECRET
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AUTO_CREATE_SCHEMA: "false"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini

volumes:
  postgres_data:
